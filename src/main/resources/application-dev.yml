firebase:
  enabled: true
  service-account-path: C:/supergods/firebase/firebase-service-account.json

# application.yml
whatsapp:
  meta:
    access-token: ${WHATSAPP_META_ACCESS_TOKEN:}
    phone-number-id: ${WHATSAPP_META_PHONE_NUMBER_ID:}
  twilio:
    enabled: ${WHATSAPP_TWILIO_ENABLED:false}
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_WHATSAPP_FROM_NUMBER:}
    messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}
    status-callback-url: ${TWILIO_STATUS_CALLBACK_URL:}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/godsdb
    username: gods
    password: admin

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true

server:
  port: 8081
