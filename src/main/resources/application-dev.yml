firebase:
  enabled: true
  service-account-path: C:/supergods/firebase/firebase-service-account.json

# application.yml
whatsapp:
  meta:
    access-token: ${WHATSAPP_META_ACCESS_TOKEN:}
    phone-number-id: ${WHATSAPP_META_PHONE_NUMBER_ID:}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/godsdb
    username: gods
    password: admin

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true

server:
  port: 8081