spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate.format_sql: false
      hibernate.jdbc.time_zone: UTC
    open-in-view: false

brevo:
  api:
    key: ${BREVO_API_KEY}

app:
  mail:
    from: ${MAIL_FROM:derwinnieves659@gmail.com}
    from-name: ${MAIL_FROM_NAME:Super Gods}

logging:
  level:
    org.hibernate.SQL: ERROR

server:
  port: ${PORT:8080}

runpod:
  enabled: ${RUNPOD_ENABLED:true}

feign:
  client:
    config:
      default:
        connectTimeout: 60000
        readTimeout: 600000

firebase:
  enabled: true